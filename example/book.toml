[book]
authors = ["mdbook-inplace-notes"]
language = "en"
src = "src"
title = "Inplace Notes — Demo Book"

[preprocessor.inplace-note]
# Optional: set popover font size (default: "1.6rem").
# Accepts any CSS font-size value: "80%", "14px", "1.2rem", etc.
popover-font-size = "80%"

# Optional: set popover max-width (default: "380px").
# Accepts any CSS width value: "500px", "40vw", "30rem", etc.
# popover-max-width = "500px"

# Optional: set popover min-width (default: "200px").
# Accepts any CSS width value: "300px", "25vw", "20rem", etc.
popover-min-width = "300px"

# Optional: padding around the superscript trigger to enlarge the hover hit area.
# Default: "6px". Accepts any CSS padding value: "8px", "0.35em", "4px 8px", etc.
trigger-hit-padding = "3px"
